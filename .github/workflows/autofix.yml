name: AutoFix com Claude

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Executar AutoFix
        uses: enriconunes/claude-autofix-action@v1.4
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
